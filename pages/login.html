<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <meta name="description" content="Login to your Ping Pong game account to track scores and compete with players">
    <meta name="theme-color" content="#667eea">
    <title>Ping Pong - Login</title>
    <link rel="stylesheet" href="../styles/main.css">
    <script src="../scripts/theme.js" type="module"></script>
</head>
<body>
    <main class="auth-container" role="main">
        <article class="auth-card">
            <header class="auth-header">
                <h1><span role="img" aria-label="Ping Pong">🏓</span> Ping Pong</h1>
                <p>Welcome back! Please login to your account</p>
            </header>

            <form id="loginForm" class="auth-form" novalidate aria-label="Login form">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" name="username" required 
                           placeholder="Enter your username" 
                           aria-required="true"
                           autocomplete="username">
                    <span class="error-message" id="usernameError" role="alert"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required 
                           placeholder="Enter your password"
                           aria-required="true"
                           autocomplete="current-password">
                    <span class="error-message" id="passwordError" role="alert"></span>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember" id="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="link" aria-label="Reset your password">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block" aria-label="Login to your account">Login</button>
            </form>

            <footer class="auth-footer">
                <p>Don't have an account? <a href="register.html" class="link" aria-label="Create a new account">Sign up here</a></p>
            </footer>
        </article>
    </main>

    <script src="../scripts/auth.js" type="module"></script>
</body>
</html>
