<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <meta name="description" content="Play Ping Pong game online - compete against other players">
    <meta name="theme-color" content="#667eea">
    <title>Ping Pong - Play Game</title>
    <link rel="stylesheet" href="../styles/main.css">
    <script src="../scripts/theme.js" type="module"></script>
</head>
<body>
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="nav-container">
            <div class="nav-brand">
                <h2><span role="img" aria-label="Ping Pong">🏓</span> Ping Pong</h2>
            </div>
            <ul class="nav-menu">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="game.html" class="active" aria-current="page">Play Game</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="login.html" id="logoutBtn" aria-label="Logout from account">Logout</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-container" role="main">
        <section class="game-page-container">
            <article class="game-wrapper">
                <header class="game-header">
                    <h1>Ping Pong Game</h1>
                    <p>First to 5 points wins!</p>
                </header>

                <div class="game-layout">
                    <div class="game-container" id="fullscreenArea">
                        <section class="score-board" aria-label="Current score">
                            <div class="player-score">
                                <span class="label">Player 1</span>
                                <span id="player1Score" class="score" aria-label="Player 1 score">0</span>
                            </div>
                            <div class="player-score">
                                <span class="label">Player 2</span>
                                <span id="player2Score" class="score" aria-label="Player 2 score">0</span>
                            </div>
                        </section>
                        <canvas id="gameCanvas" role="img" aria-label="Ping pong game canvas"></canvas>
                        <div id="gameOver" class="game-over hidden" role="alert" aria-live="polite">
                            <h2>Game Over!</h2>
                            <p id="winner"></p>
                            <button id="restartBtn" class="btn" aria-label="Start a new game">Play Again</button>
                        </div>
                    </div>

                    <aside class="controls" aria-label="Game controls">
                        <div class="button-group">
                            <button id="startBtn" class="btn btn-primary btn-block" aria-label="Start the game">Start Game</button>
                            <button id="pauseBtn" class="btn btn-block" disabled aria-label="Pause the game">Pause</button>
                            <button id="fullscreenBtn" class="btn btn-block" aria-label="Toggle fullscreen mode">Fullscreen</button>
                        </div>

                        <section class="instructions" aria-label="Game controls instructions">
                            <h3>Controls</h3>
                            <div class="instruction-row">
                                <div><strong>Player 1:</strong><br>W / S keys</div>
                                <div><strong>Player 2:</strong><br>I / K keys</div>
                            </div>
                            <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-color);">
                                <strong>Space:</strong> Start Game
                            </div>
                        </section>
                    </aside>
                </div>
            </article>
        </section>
    </main>

    <script src="../scripts/game.js" type="module"></script>
</body>
</html>
