<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Debug</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        h1 {
            color: #e50914;
        }
        .section {
            background: #2a2a2a;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        pre {
            background: #000;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
        button {
            background: #e50914;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #f40612;
        }
        .count {
            font-size: 24px;
            font-weight: bold;
            color: #e50914;
        }
    </style>
</head>
<body>
    <h1>🔍 Database Debug Viewer</h1>
    
    <div class="section">
        <h2>Actions</h2>
        <button onclick="loadData()">Refresh Data</button>
        <button onclick="clearDB()">Clear All Data</button>
        <button onclick="addTestUser()">Add Test User</button>
        <button onclick="addSpecificUser()">Add Missing User</button>
        <button onclick="simulateInvitation()">Simulate Incoming Invitation</button>
    </div>
    
    <div class="section">
        <h2>Add Custom User</h2>
        <input type="text" id="newUsername" placeholder="Username" style="padding: 8px; margin: 5px; border-radius: 4px;">
        <input type="email" id="newEmail" placeholder="Email" style="padding: 8px; margin: 5px; border-radius: 4px;">
        <button onclick="addCustomUser()">Add User</button>
    </div>

    <div class="section">
        <h2>Users Collection</h2>
        <p>Total Users: <span class="count" id="userCount">0</span></p>
        <pre id="usersData">Loading...</pre>
    </div>

    <div class="section">
        <h2>Sessions Collection</h2>
        <p>Total Sessions: <span class="count" id="sessionCount">0</span></p>
        <pre id="sessionsData">Loading...</pre>
    </div>

    <div class="section">
        <h2>Game Invitations</h2>
        <p>Total Invitations: <span class="count" id="invitationCount">0</span></p>
        <pre id="invitationsData">Loading...</pre>
    </div>

    <div class="section">
        <h2>Friend Requests</h2>
        <p>Sent: <span class="count" id="friendRequestCount">0</span></p>
        <p>Received: <span class="count" id="receivedRequestCount">0</span></p>
        <pre id="friendRequestsData">Loading...</pre>
    </div>

    <div class="section">
        <h2>LocalStorage Keys</h2>
        <pre id="localStorageKeys">Loading...</pre>
    </div>

    <script type="module">
        import api from './js/utils/api.js';

        window.api = api;

        async function loadData() {
            try {
                // Get users from API
                const users = await api.getAllUsers();
                document.getElementById('userCount').textContent = users.length;
                document.getElementById('usersData').textContent = JSON.stringify(users, null, 2);

                // Get current user for invitations
                const currentUser = JSON.parse(localStorage.getItem('userData') || '{}');
                
                // Get sessions (mock for now)
                const sessions = [];
                document.getElementById('sessionCount').textContent = sessions.length;
                document.getElementById('sessionsData').textContent = JSON.stringify(sessions, null, 2);

                // Get game invitations from API
                let invitations = [];
                if (currentUser.userId) {
                    invitations = await api.getInvitations(currentUser.userId);
                }
                document.getElementById('invitationCount').textContent = invitations.length;
                document.getElementById('invitationsData').textContent = JSON.stringify(invitations, null, 2);

                // Get friend requests from API
                let friendRequests = [];
                if (currentUser.userId) {
                    friendRequests = await api.getFriendRequests(currentUser.userId);
                }
                document.getElementById('friendRequestCount').textContent = friendRequests.filter(r => r.fromId === currentUser.userId).length;
                document.getElementById('receivedRequestCount').textContent = friendRequests.length;
                document.getElementById('friendRequestsData').textContent = JSON.stringify(friendRequests, null, 2);

                // Get all localStorage keys
                const keys = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    keys.push({
                        key: key,
                        value: localStorage.getItem(key)
                    });
                }
                document.getElementById('localStorageKeys').textContent = JSON.stringify(keys, null, 2);

                console.log('Users:', users);
                console.log('Sessions:', sessions);
                console.log('Game Invitations:', invitations);
                console.log('Friend Requests:', friendRequests);
                console.log('All localStorage:', keys);
            } catch (error) {
                console.error('Error loading data:', error);
                alert('Error loading data from API. Make sure backend is running on port 3000!');
            }
        }

        async function clearDB() {
            if (confirm('Are you sure you want to clear all data? This will require manual backend database reset.')) {
                localStorage.clear();
                alert('LocalStorage cleared! To reset backend database, delete backend/database.json manually.');
                loadData();
            }
        }

        async function addTestUser() {
            const username = 'testuser_' + Date.now();
            try {
                const user = await api.register(username, username + '@test.com', 'password123');
                console.log('Test user created:', user);
                loadData();
                alert('Test user created: ' + username);
            } catch (error) {
                console.error('Error creating test user:', error);
                alert('Error: ' + error.message);
            }
        }

        async function addSpecificUser() {
            try {
                const users = await api.getAllUsers();
                const hasMelmehdi = users.some(u => u.username === 'melmehdi');
                const hasTest = users.some(u => u.username === 'test');
                
                if (!hasMelmehdi) {
                    await api.register('melmehdi', 'mehdimahfoud321@gmail.com', 'password123');
                    alert('Added user: melmehdi');
                }
                
                if (!hasTest) {
                    await api.register('test', 'user@gmail.com', 'password123');
                    alert('Added user: test');
                }
                
                if (hasMelmehdi && hasTest) {
                    alert('Both users already exist!');
                }
                
                loadData();
            } catch (error) {
                console.error('Error adding user:', error);
                alert('Error: ' + error.message);
            }
        }

        async function addCustomUser() {
            const username = document.getElementById('newUsername').value.trim();
            const email = document.getElementById('newEmail').value.trim();
            
            if (!username || !email) {
                alert('Please enter both username and email');
                return;
            }
            
            try {
                const user = await api.register(username, email, 'password123');
                console.log('Custom user created:', user);
                document.getElementById('newUsername').value = '';
                document.getElementById('newEmail').value = '';
                loadData();
                alert('User created: ' + username);
            } catch (error) {
                console.error('Error creating user:', error);
                alert('Error: ' + error.message);
            }
        }

        async function simulateInvitation() {
            const currentUser = JSON.parse(localStorage.getItem('userData') || '{}');
            
            if (!currentUser.username) {
                alert('Please login first!');
                return;
            }
            
            try {
                const users = await api.getAllUsers();
                
                // Find another user to simulate invitation from
                const otherUser = users.find(u => u.id !== currentUser.userId);
                
                if (!otherUser) {
                    alert('Need at least 2 users in database. Add another user first.');
                    return;
                }
                
                // Send invitation via API
                await api.sendInvitation(
                    otherUser.id,
                    otherUser.username,
                    currentUser.userId,
                    currentUser.username
                );
                
                alert(`Simulated invitation from ${otherUser.username}!`);
                loadData();
                
            } catch (error) {
                console.error('Error simulating invitation:', error);
                alert('Error: ' + error.message);
            }
        }

        window.loadData = loadData;
        window.clearDB = clearDB;
        window.addTestUser = addTestUser;
        window.addSpecificUser = addSpecificUser;
        window.addCustomUser = addCustomUser;
        window.simulateInvitation = simulateInvitation;

        // Load data on page load
        loadData();
    </script>
</body>
</html>
