<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to FT Transcendence - Track your stats, compete with players worldwide">
    <meta name="theme-color" content="#6366f1">
    <title>Login - FT Transcendence</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏓</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/css/main.css">
    <script src="/ts/theme.ts" type="module"></script>
</head>
<body>
    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="brand-icon"><i class="fas fa-table-tennis"></i></div>
                <h1>FT Transcendence</h1>
            </div>
            
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to continue your journey</p>
            </div>

            <form id="loginForm" class="auth-form" novalidate>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" 
                           placeholder="Enter your username" 
                           autocomplete="username" required>
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" 
                           placeholder="••••••••"
                           autocomplete="current-password" required>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="link-primary">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    Sign In
                </button>
            </form>

            <div class="auth-divider">
                <span>or</span>
            </div>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html" class="link-primary">Create one now</a></p>
            </div>

            <div class="auth-links">
                <a href="index.html#home" class="link-secondary">← Back to Home</a>
            </div>
        </div>
    </main>

    <script src="/ts/login.ts" type="module"></script>
</body>
</html>
