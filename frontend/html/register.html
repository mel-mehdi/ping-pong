<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Join FT Transcendence - Create your account and start competing">
    <meta name="theme-color" content="#6366f1">
    <title>Sign Up - FT Transcendence</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏓</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/css/main.css">
    <script src="/ts/theme.ts" type="module"></script>
</head>
<body>
    <main class="auth-container">
        <div class="auth-card auth-card-register">
            <div class="auth-welcome">
                <div class="auth-brand">
                    <div class="brand-icon"><i class="fas fa-table-tennis"></i></div>
                    <h1>FT Transcendence</h1>
                    <p>Join the ultimate table tennis experience. Compete, connect, and conquer!</p>
                </div>
                <div class="auth-features">
                    <div class="feature-item">
                        <i class="fas fa-trophy"></i>
                        <span>Track Your Stats</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-gamepad"></i>
                        <span>Compete Online</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-users"></i>
                        <span>Join Community</span>
                    </div>
                </div>
            </div>
            
            <div class="auth-form-section">
                <div class="auth-header">
                    <h2>Create Account</h2>
                    <p>Join the community and start playing</p>
                </div>

                <form id="registerForm" class="auth-form" novalidate>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" id="username" name="username" 
                                   placeholder="Choose a username" 
                                   autocomplete="username" required>
                            <span class="error-message" id="usernameError"></span>
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" 
                                   placeholder="your@email.com"
                                   autocomplete="email" required>
                            <span class="error-message" id="emailError"></span>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" 
                                   placeholder="••••••••"
                                   autocomplete="new-password" required>
                            <span class="error-message" id="passwordError"></span>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" 
                                   placeholder="••••••••"
                                   autocomplete="new-password" required>
                            <span class="error-message" id="confirmPasswordError"></span>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" name="terms" id="terms" required>
                            <span>I agree to the Terms & Conditions</span>
                        </label>
                        <span class="error-message" id="termsError"></span>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        Create Account
                    </button>
                </form>

                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html" class="link-primary">Sign in</a></p>
                </div>

                <div class="auth-links">
                    <a href="index.html#home" class="link-secondary">← Back to Home</a>
                </div>
            </div>
        </div>
    </main>

    <script src="/ts/register.ts" type="module"></script>
</body>
</html>
