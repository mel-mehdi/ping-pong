<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Join FT Transcendence - Create your account and start competing">
    <meta name="theme-color" content="#6366f1">
    <title>Sign Up - FT Transcendence</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏓</text></svg>">
    <link rel="stylesheet" href="../styles/main.css">
    <script src="../scripts/theme.js" type="module"></script>
</head>
<body>
    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-brand">
                <div class="brand-icon">🏓</div>
                <h1>FT Transcendence</h1>
            </div>
            
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Join the community and start playing</p>
            </div>

            <form id="registerForm" class="auth-form" novalidate>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" 
                           placeholder="Choose a username" 
                           autocomplete="username" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" 
                           placeholder="your@email.com"
                           autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" 
                           placeholder="••••••••"
                           autocomplete="new-password" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" 
                           placeholder="••••••••"
                           autocomplete="new-password" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="terms" required>
                        <span>I agree to the Terms & Conditions</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    Create Account
                </button>
            </form>

            <div class="auth-divider">
                <span>or</span>
            </div>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html" class="link-primary">Sign in</a></p>
            </div>

            <div class="auth-links">
                <a href="../index.html#home" class="link-secondary">← Back to Home</a>
            </div>
        </div>
    </main>

    <script src="../scripts/auth.js" type="module"></script>
</body>
</html>
