<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PingPong - Modern Pong Game with tournaments, multiplayer, and global rankings">
    <meta name="keywords" content="pong game, tournament, multiplayer, browser game, competitive gaming">
    <meta name="theme-color" content="#0f172a">
    <title>PingPong - Modern Pong Game</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏓</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Inline minimal font-family so the font is applied immediately after load -->
    <style>html,body{font-family:'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;}</style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div id="root"></div>
    <script>
    (function(){
      // Suppress noisy Vite client logs in dev (e.g., "[vite] connecting...", "[vite] connected.")
      const isViteMsg = msg => typeof msg === 'string' && (msg.includes('[vite]') || msg.includes('[vite] connecting') || msg.includes('[vite] connected'));
      ['log','info','warn','debug'].forEach(fn => {
        const orig = console[fn];
        console[fn] = function(...args){
          if (args.some(isViteMsg)) return;
          return orig.apply(console, args);
        };
      });

      // Suppress performance violations in dev mode
      const origWarn = console.warn;
      console.warn = function(...args) {
        const msg = args[0];
        if (typeof msg === 'string' && msg.includes('[Violation]') && msg.includes('handler took')) return;
        return origWarn.apply(console, args);
      };
    })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
