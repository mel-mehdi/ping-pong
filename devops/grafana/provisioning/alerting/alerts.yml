          - refId: 'C'
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: '__expr__'
            model:
              conditions:
                - evaluator: { params: [0.5], type: 'gt' }
                  operator: { type: 'and' }
                  query: { params: ['B'] }
                  reducer: { params: [], type: 'last' }
                  type: 'query'
              refId: 'C'
              type: 'classic_conditions'
        for: '30s'
        annotations:
          summary: "Postgres container is down!"
          description: "Prometheus has detected that the Postgres Container is unreachable for more than 30 seconds."
        labels:
          severity: 'critical'
      
      - uid: 'redis_down'
