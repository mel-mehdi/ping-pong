global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']

  - job_name: 'docker'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'backend'
    scheme: https
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets: ['backend:8001']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']
  
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']