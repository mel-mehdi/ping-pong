
networks:
  transcendence-network:
    driver: bridge

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
  django-static:

services:
  database:
    image: postgres:15
    container_name: transcendence-db
    environment:
      POSTGRES_DB: transcendence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - transcendence-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: transcendence-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${DB_PASSWORD}@database:5432/transcendence?sslmode=disable"
    networks:
      - transcendence-network
    depends_on:
      - database

  prometheus:
    image: prom/prometheus:latest
    container_name: transcendence-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - transcendence-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: transcendence-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3001:3000"
    networks:
      - transcendence-network
    depends_on:
      - prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: transcendence-node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - transcendence-network
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: transcendence-cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - transcendence-network
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg

  backup:
    image: postgres:15
    container_name: transcendence-backup
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - ./backups:/backups
      - /etc/localtime:/etc/localtime:ro
    command: >
      sh -c "chmod +x /backup.sh && 
             while true; do 
               /backup.sh; 
               sleep 86400; 
             done"
    networks:
      - transcendence-network
    depends_on:
      - database
    restart: unless-stopped

  status-page:
    image: nginx:alpine
    container_name: transcendence-status-page
    volumes:
      - ./status-page:/usr/share/nginx/html:ro
    ports:
      - "8080:80"
    networks:
      - transcendence-network
    restart: unless-stopped

  # ============================================
  # APPLICATION SERVICES
  # ============================================
  
  redis:
    image: redis:8-alpine
    container_name: transcendence-redis
    ports:
      - "6379:6379"
    networks:
      - transcendence-network
    restart: unless-stopped

  backend:
    build:
      context: ./ft_mohsinine/backend
      dockerfile: Dockerfile
    container_name: transcendence-backend
    env_file:
      - ft_mohsinine/backend/.env
    volumes:
      - ./ft_mohsinine/backend:/app
      - django-static:/app/staticfiles
    ports:
      - "8001:8001"
    networks:
      - transcendence-network
    depends_on:
      - database
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8001/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./ft_mohsinine/frontend
      dockerfile: Dockerfile
    container_name: transcendence-frontend
    volumes:
      - ./ft_mohsinine/frontend:/app
      - /app/node_modules
    ports:
      - "8000:8000"
    networks:
      - transcendence-network
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: transcendence-nginx
    ports:
      - "8888:80"
      - "8443:443"
    volumes:
      - ./ft_mohsinine/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ft_mohsinine/nginx/ssl:/etc/nginx/ssl:ro
      - django-static:/app/static:ro
    networks:
      - transcendence-network
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
