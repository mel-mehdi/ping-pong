
services:

  database:
    image: postgres:18-alpine
    container_name: postgres
    env_file:
      - backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    restart: unless-stopped
    networks:
      - transcendence_network

  redis:
    image: redis:8-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - transcendence_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: django
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
      - django_static:/app/staticfiles
    env_file:
      - backend/.env
    depends_on:
      - database
      - redis
    restart: unless-stopped
    networks:
      - transcendence_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react
    ports:
      - "8000:8000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - transcendence_network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - django_static:/app/static:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - transcendence_network

networks:
  transcendence_network:
    driver: bridge

volumes:
  postgres_data:
  django_static: