name: ft_trans

services:

  database:
    image: postgres:18-alpine
    container_name: postgres
    env_file:
      - backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    restart: unless-stopped
    networks:
      - transcendence_network

  redis:
    image: redis:8-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - transcendence_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: django
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
      - django_static:/app/staticfiles
      - ./nginx/ssl:/app/ssl:ro
    env_file:
      - backend/.env
    depends_on:
      - database
      - redis
    restart: unless-stopped
    networks:
      - transcendence_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react
    ports:
      - "5173:5173"
    environment:
      - PORT=5173
      - VITE_BACKEND_ORIGIN=
      - VITE_WS_ORIGIN=wss://backend:8001
      - VITE_DEV_BACKEND_TARGET=https://backend:8001
      - VITE_DEV_WS_TARGET=wss://backend:8001
      - VITE_DEBUG_WS=0
      - VITE_SILENT_CONSOLE=1
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./nginx/ssl:/nginx/ssl:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - transcendence_network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - django_static:/app/static:ro
      - ./backend/media:/app/media:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - transcendence_network

networks:
  transcendence_network:
    driver: bridge

volumes:
  postgres_data:
  django_static: