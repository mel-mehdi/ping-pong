name: ft_trans

services:

  database:
    image: postgres:18-alpine
    container_name: postgres
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    restart: unless-stopped
    networks:
      - transcendence_network

  redis:
    image: redis:8-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - transcendence_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: django
    volumes:
      - ./backend:/app
      - django_static:/app/staticfiles
      - ./nginx/ssl:/app/ssl:ro
    env_file:
      - .env
    depends_on:
      - database
      - redis
    restart: unless-stopped
    networks:
      - transcendence_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react
    environment:
      - PORT=5173
      - VITE_HMR_HOST=auto
      - VITE_HMR_PROTOCOL=wss
      - VITE_HMR_PORT=8443
      - VITE_BACKEND_ORIGIN=
      - VITE_WS_ORIGIN=
      - VITE_DEV_BACKEND_TARGET=https://backend:8001
      - VITE_DEV_WS_TARGET=
      - VITE_DEBUG_WS=1
      - VITE_SILENT_CONSOLE=1
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./nginx/ssl:/nginx/ssl:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - transcendence_network

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - django_static:/app/static:ro
      - ./backend/media:/app/media:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - transcendence_network


  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - transcendence_network
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    ports:
      - "8003:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - transcendence_network
    restart: unless-stopped
  
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}?sslmode=disable"
    networks:
      - transcendence_network
    restart: unless-stopped
    depends_on:
      - database

  redis_exporter:
    image: oliver006/redis_exporter
    container_name: redis_exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
    networks:
      - transcendence_network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./devops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - transcendence_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./devops/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./devops/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./devops/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
    networks:
      - transcendence_network
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  transcendence_network:
    driver: bridge

volumes:
  postgres_data:
  django_static:
  prometheus_data:
  grafana_data: