version: '3.8'

services:
  backend:
    build: .
    container_name: ft_mohsinine_backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app/backend
      - ./backend/database.json:/app/backend/database.json
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    command: node backend/server.js

  frontend:
    image: nginx:alpine
    container_name: ft_mohsinine_frontend
    ports:
      - "8000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: ft_mohsinine_network
